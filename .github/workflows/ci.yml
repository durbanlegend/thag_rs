name: CI

on:
  push:
    branches:
      - main
      - develop
    # Exclude tag pushes
    tags-ignore:
      - "*"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install wayland-client dependencies (Ubuntu only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libwayland-dev

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Build
        run: cargo build

      - name: Build with tools feature
        run: cargo build --features tools

      - name: Run tests
        run: cargo test --no-fail-fast -- --test-threads=1

      - name: Test thag_styling example tests
        run: cargo test --examples -p thag_styling --no-fail-fast --features "ratatui_support,crossterm_support,nu_ansi_term_support" -- --test-threads=1

      - name: Test thag_profiler example tests
        run: cargo test --examples -p thag_profiler --no-fail-fast -- --test-threads=1

      - name: Test thag_profiler unit and integration tests (time_profiling)
        run: cargo test -p thag_profiler --no-fail-fast -- --test-threads=1

      - name: Test thag_profiler unit and integration tests (full_profiling)
        if: runner.os != 'Windows'
        run: cargo test -p thag_profiler --features full_profiling --no-fail-fast -- --test-threads=1

      - name: Test thag_proc_macros
        run: cargo test -p thag_proc_macros --no-fail-fast -- --test-threads=1

      - name: Test thag_common
        run: cargo test -p thag_common --no-fail-fast -- --test-threads=1

      - name: Test thag_styling
        run: cargo test -p thag_styling --no-fail-fast -- --test-threads=1
